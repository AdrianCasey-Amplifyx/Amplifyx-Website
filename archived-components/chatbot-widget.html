<!-- Chatbot Widget — archived from index.html / amplifyops.html -->

<!-- Required CSS: css/chatbot.css (archived here as chatbot.css) -->
<!-- Required JS: js/chatbot-ai.js (archived here as chatbot-ai.js) -->
<!-- Required JS: js/rag-helper.js (archived here as rag-helper.js) -->
<!-- Required: <script src="js/config-public.js"></script> must be loaded first -->

<div id="chatbot-container" class="chatbot-container">
    <button id="chatbot-toggle" class="chatbot-toggle" aria-label="Open chat">
        <svg class="chat-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M20 2H4C2.9 2 2 2.9 2 4V18C2 19.1 2.9 20 4 20H8L12 23L16 20H20C21.1 20 22 19.1 22 18V4C22 2.9 21.1 2 20 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7 9H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M7 13H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg class="close-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" style="display: none;">
            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="chat-badge" style="display: none;">1</span>
    </button>

    <div id="chatbot-window" class="chatbot-window">
        <div class="chatbot-header">
            <div class="chatbot-header-content">
                <div class="chatbot-avatar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" fill="url(#gradient)" opacity="0.2"/>
                        <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M12 6V12L16 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#7B3FF2"/>
                                <stop offset="100%" style="stop-color:#E94CFF"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="chatbot-header-text">
                    <h3>Amplifyx AI Assistant</h3>
                    <p>Let's discuss your project</p>
                </div>
            </div>
            <button id="chatbot-minimize" class="chatbot-minimize" aria-label="Minimize chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <div id="chatbot-messages" class="chatbot-messages">
            <div class="chat-message bot">
                <div class="message-content">
                    <p>Hi! I'm here to help you explore how Amplifyx can accelerate your product development with AI.</p>
                    <p>What brings you here today?</p>
                </div>
            </div>
        </div>

        <div class="chatbot-input-container">
            <form id="chatbot-form" class="chatbot-form">
                <input
                    type="text"
                    id="chatbot-input"
                    class="chatbot-input"
                    placeholder="Type your message..."
                    autocomplete="off"
                    maxlength="500"
                />
                <button type="submit" class="chatbot-send" aria-label="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
            <div class="chatbot-footer">
                <p>Powered by Amplifyx AI</p>
            </div>
        </div>
    </div>
</div>
